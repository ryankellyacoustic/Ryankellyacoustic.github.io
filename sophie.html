<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Curly Maple Mandolin Stand | Ryan Kelly Acoustic</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Iowan Old Style', serif;
  background: #f7f7f7;
  color: #111;
}

.wrap {
  max-width: 900px;
  margin: auto;
  padding: 60px 20px;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  margin-bottom: 20px;
}

.product-image {
  width: 100%;
  max-width: 600px;
  display: block;
  margin-bottom: 40px;
}

.price {
  font-size: 20px;
  margin-bottom: 20px;
}

.back-link {
  display: inline-block;
  margin-top: 40px;
  text-decoration: none;
  border-bottom: 1px solid black;
}
.product-gallery {
  margin-bottom: 40px;
}

.product-main {
  width: 100%;
  max-width: 650px;
  display: block;
  margin-bottom: 20px;
  border-radius: 12px;
}

.thumbnails {
  display: flex;
  gap: 15px;
}

.thumbnails img {
  width: 100px;
  cursor: pointer;
  border-radius: 8px;
  opacity: 0.8;
  transition: opacity 0.2s ease;
}

.thumbnails img:hover {
  opacity: 1;
}
  
</style>
  
</head>

<body>

<div class="product-gallery">
  <img id="mainImage" class="product-main" src="images/sophie1.jpg" alt="Curly Maple Mandolin Stand">

  <div class="thumbnails">
    <img src="images/sophie1.jpg" onclick="changeImage(this)">
    <img src="images/sophie2.jpg" onclick="changeImage(this)">
    <img src="images/sophie3.jpg" onclick="changeImage(this)">
  </div>
</div>
<script>
function changeImage(element) {
  document.getElementById("mainImage").src = element.src;
}
</script>
</body>
</html>
